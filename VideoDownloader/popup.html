<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px 20px 20px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
    }
    .input-wrap { margin-bottom: 14px; }
    .input-wrap input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
    }
    .input-wrap input::placeholder { color: #666; }
    .input-wrap input:focus { outline: none; border-color: #4a9eff; }
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #4a9eff;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn:hover { background: #3a8eef; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .hint { margin-top: 12px; font-size: 10px; color: #666; line-height: 1.4; }
    .later { margin-top: 14px; padding-top: 12px; border-top: 1px solid #222; font-size: 10px; color: #555; }
  </style>
</head>
<body>
  <h2>Video Downloader</h2>
  <div class="input-wrap">
    <input type="text" id="url" placeholder="Ссылка на видео (LinkedIn, Instagram, Twitter…)" autocomplete="off" />
  </div>
  <button type="button" class="btn" id="btnOpen">Открыть загрузчик</button>
  <p class="hint" id="hint">Откроется SaveFrom — сервис сам определит источник. Ссылка скопирована в буфер (на случай если страница не примет её в адресе).</p>
  <p class="later">Позже: YouTube (видео и музыка).</p>
  <script src="popup.js"></script>
</body>
</html>
