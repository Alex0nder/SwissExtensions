<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px 20px 20px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
    }
    .input-wrap { margin-bottom: 10px; }
    .input-wrap input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
    }
    .input-wrap input::placeholder { color: #666; }
    .input-wrap input:focus { outline: none; border-color: #4a9eff; }
    .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn {
      flex: 1;
      padding: 10px 10px;
      border: none;
      border-radius: 6px;
      background: #4a9eff;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .btn:hover { background: #3a8eef; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-sec {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ccc;
    }
    .btn-sec:hover:not(:disabled) { background: #333; }
    .btn-full { width: 100%; margin-bottom: 8px; }
    .hint { margin-top: 8px; font-size: 10px; color: #888; line-height: 1.45; }
    .hint.err { color: #f66; }
    .section-label {
      margin: 12px 0 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
    }
    .recent {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }
    .recent.empty { display: none; }
    .recent-item {
      text-align: left;
      padding: 6px 8px;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      background: #161616;
      color: #aaa;
      font-size: 10px;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-item:hover { border-color: #444; color: #ddd; }
    .later { margin-top: 12px; padding-top: 10px; border-top: 1px solid #222; font-size: 10px; color: #555; }
  </style>
</head>
<body>
  <h2>Video Downloader</h2>
  <div class="input-wrap">
    <input type="text" id="url" placeholder="Ссылка на видео (LinkedIn, Instagram, X…)" autocomplete="off" />
  </div>
  <button type="button" class="btn btn-full btn-sec" id="btnFromTab">С активной вкладки</button>
  <div class="btn-row">
    <button type="button" class="btn" id="btnOpen">Основной</button>
    <button type="button" class="btn btn-sec" id="btnOpenAlt">Запасной</button>
  </div>
  <p class="hint" id="hint">Основной — ru.savefrom; запасной — savefrom.net. Ссылка копируется в буфер на случай сбоя в адресной строке.</p>
  <p class="section-label">Недавние</p>
  <div class="recent empty" id="recentList"></div>
  <p class="later">YouTube и другие источники определяет сам сервис загрузки.</p>
  <script src="popup.js"></script>
</body>
</html>
