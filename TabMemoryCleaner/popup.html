<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 280px;
      margin: 0;
      padding: 20px 18px 22px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 12px;
      background: #0a0a0a;
      color: #f5f5f5;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
    }
    button.primary {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #2a2a2a;
      background: #fff;
      color: #0a0a0a;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    button.primary:hover { background: #eee; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    input[type="checkbox"] { width: 15px; height: 15px; accent-color: #e63946; cursor: pointer; flex-shrink: 0; }
    label { cursor: pointer; font-size: 11px; color: #b0b0b0; line-height: 1.35; }
    .section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #1a1a1a;
    }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      min-height: 52px;
      resize: vertical;
      padding: 8px 10px;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      background: #111;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 11px;
      line-height: 1.35;
    }
    textarea:focus { outline: none; border-color: #444; }
    #status {
      font-size: 10px;
      color: #666;
      margin-top: 10px;
      min-height: 1.4em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .kbd-hint { font-size: 10px; color: #555; margin-top: 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>Tab Memory Cleaner</h2>
  <button type="button" class="primary" id="btnDiscard">Discard background tabs</button>
  <div class="row">
    <input type="checkbox" id="skipPinned" checked>
    <label for="skipPinned">Skip pinned</label>
  </div>
  <div class="row">
    <input type="checkbox" id="skipAudible" checked>
    <label for="skipAudible">Skip playing audio</label>
  </div>
  <div class="row">
    <input type="checkbox" id="skipIncognito" checked>
    <label for="skipIncognito">Skip incognito</label>
  </div>
  <div class="row">
    <input type="checkbox" id="skipGrouped" checked>
    <label for="skipGrouped">Skip tabs in groups</label>
  </div>
  <div class="section">
    <div class="section-title">Never discard (domains, one per line)</div>
    <textarea id="excludedDomains" placeholder="mail.google.com"></textarea>
  </div>
  <p class="kbd-hint">Shortcut: Option+Shift+K (Chrome → Manage Extension → Keyboard shortcuts).</p>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
