<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* Swiss style: minimalism, strict */
    body {
      width: 200px;
      padding: 20px 24px;
      margin: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      background: #fff;
      color: #000;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    button:hover { background: #000; color: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      font-size: 10px;
      color: #888;
      margin-top: 12px;
      min-height: 1.4em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .err { color: #000; }
  </style>
</head>
<body>
  <h2>Скрин по тайлам 1440×1024</h2>
  <button id="btnScan">Сканировать страницу</button>
  <div class="capture-progress" id="captureProgress" style="display:none; margin-top:12px;">
    <div style="height:4px; background:#e0e0e0; overflow:hidden; border-radius:2px;">
      <div id="captureProgressFill" style="height:100%; background:#000; width:0%; transition:width 0.15s ease;"></div>
    </div>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
