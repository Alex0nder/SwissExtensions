<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 260px;
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #0a0a0a;
      color: #f5f5f5;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
    }
    button {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #2a2a2a;
      background: #fff;
      color: #0a0a0a;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    button:hover { background: #eee; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: #e63946; cursor: pointer; }
    label { cursor: pointer; font-size: 12px; color: #999; }
    #status {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      min-height: 1.4em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <h2>Tab Memory Cleaner</h2>
  <button id="btnDiscard">Discard background tabs</button>
  <div class="row">
    <input type="checkbox" id="skipPinned" checked>
    <label for="skipPinned">Skip pinned tabs</label>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
